# Local MongoDB without installing MongoDB on Windows:
#   docker compose up -d
# Then keep MONGODB_URI=mongodb://127.0.0.1:27017/coldtech in server/.env
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - coldtech_mongo:/data/db

volumes:
  coldtech_mongo:
